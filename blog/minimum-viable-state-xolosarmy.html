<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xNS: Explorador de Arquitectura</title>
    
    <!-- Chosen Palette: "Warm Neutral Harmony" (Stone-50 background, Slate-800 text, Rust/Sage/Ochre accents) -->
    <!-- Application Structure Plan: Un diseño de "Dashboard Exploratorio Evolutivo". Utiliza una barra de navegación lateral para guiar al usuario a través de las 5 fases de evolución del Network State (desde la filosofía hasta el código). El área principal cambia dinámicamente para mostrar una mezcla de texto explicativo estructurado y representaciones visuales interactivas (tarjetas HTML, gráficos Chart.js, líneas de tiempo). Esta estructura permite desglosar un concepto técnico/filosófico denso en piezas digeribles y explorables a voluntad. -->
    <!-- Visualization & Content Choices: 
         - Filosofía -> Goal: Informar -> Tarjetas HTML interactivas -> Interacción: Hover/Click para detalles -> Justificación: Claridad conceptual sin sobrecargar -> Método: HTML/Tailwind.
         - Codificación/CAE -> Goal: Comparar/Explicar -> Gráfico de Barras Chart.js -> Interacción: Tooltips -> Justificación: Visualizar los umbrales cuantitativos de los niveles de agentes -> Método: Chart.js.
         - Gobernanza -> Goal: Procesos -> Línea de tiempo interactiva -> Interacción: Click para ver pasos -> Justificación: Muestra el flujo CI/CD claramente -> Método: HTML/Tailwind + JS.
         - Sistema/Agentes -> Goal: Organizar -> Layout de Grid de Dashboard -> Interacción: Selección de agente -> Justificación: Simula el entorno operativo real -> Método: HTML/Tailwind.
         - Memoria -> Goal: Relación -> Diagrama de flujo basado en bloques HTML -> Interacción: Animación CSS simple -> Justificación: Representa la inmutabilidad on-chain -> Método: HTML/Tailwind. 
         CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        xns: {
                            bg: '#F7F7F5', // Warm off-white
                            surface: '#FFFFFF',
                            text: '#2D3748', // Slate 800
                            muted: '#718096', // Slate 500
                            fuego: '#E07A5F', // Rust orange (IA)
                            alma: '#81B29A', // Sage green (Humano)
                            guia: '#F2CC8F', // Ochre (Xolo)
                            code: '#3D405B', // Navy (Sistema)
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Strict Chart Container Requirements */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 450px;
            background-color: white;
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        @media (max-width: 768px) {
            .chart-container {
                height: 250px;
            }
        }
        
        /* Custom Scrollbar for neatness */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F7F7F5; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

                                <div class="bg-xns-code text-white p-4 rounded shadow text-center border-t-4 border-xns-guia w-48 z-10">
                                    <div class="text-xs text-gray-300 mb-1">Paso 3</div>
                                    <div class="font-bold text-sm">Cristalización</div>
                                    <div class="text-xs text-green-400 mt-2">Memoria Inmutable de la Red</div>
                                </div>

                            </div>
                            <p class="text-center text-sm text-gray-600 mt-8">El objetivo es hacer accesible el RFC completo desde el dashboard y anclar su prueba matemática on-chain, cerrando el ciclo de confianza.</p>
                        </div>
                    </div>
                `
            }
        ];

        let currentSectionId = 'filosofia';
        let caeChartInstance = null;

        // --- 2. UI Initialization & Navigation ---
        function initApp() {
            const navMenu = document.getElementById('nav-menu');
            
            // Build Navigation
            appData.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors duration-150 flex items-center gap-3 ${index === 0 ? 'bg-xns-code text-white shadow' : 'text-gray-600 hover:bg-gray-100'}`;
                btn.id = `nav-${item.id}`;
                btn.onclick = () => loadSection(item.id);
                btn.innerHTML = `<span class="text-lg">${item.icon}</span> ${item.title}`;
                navMenu.appendChild(btn);
            });

            // Load initial section
            loadSection(currentSectionId);
        }

        function loadSection(id) {
            currentSectionId = id;
            const sectionData = appData.find(item => item.id === id);
            if (!sectionData) return;

            // Update Nav styling
            appData.forEach(item => {
                const btn = document.getElementById(`nav-${item.id}`);
                if (item.id === id) {
                    btn.className = `w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors duration-150 flex items-center gap-3 bg-white text-xns-code border-l-4 border-xns-code shadow-sm`;
                } else {
                    btn.className = `w-full text-left px-4 py-3 rounded-lg text-sm font-medium transition-colors duration-150 flex items-center gap-3 text-gray-600 hover:bg-gray-100 border-l-4 border-transparent`;
                }
            });

            // Render Content Wrapper
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = `
                <div class="fade-in max-w-5xl mx-auto">
                    <header class="mb-6">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-3xl">${sectionData.icon}</span>
                            <h2 class="text-3xl font-bold text-xns-text tracking-tight">${sectionData.title}</h2>
                        </div>
                        <h3 class="text-xl text-xns-fuego font-medium">${sectionData.subtitle}</h3>
                    </header>
                    
                    <div class="bg-white p-5 rounded-lg border border-gray-200 shadow-sm mb-6 border-l-4 border-l-xns-guia">
                        <p class="text-gray-700 leading-relaxed">${sectionData.intro}</p>
                    </div>

                    ${sectionData.render()}
                </div>
            `;

            // Execute specific logic after render if needed
            if (sectionData.afterRender) {
                sectionData.afterRender();
            }
        }

        // --- 3. Interactive Specific Functions ---

        // Section 1: Toggle Details
        function toggleDetails(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                el.classList.add('fade-in');
            } else {
                el.classList.add('hidden');
            }
        }

        // Section 2: Chart.js Initialization
        function initCaeChart() {
            const ctx = document.getElementById('caeChart').getContext('2d');
            
            if (caeChartInstance) {
                caeChartInstance.destroy();
            }

            caeChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['A0 (Básico)', 'A1 (Tesorería)', 'A2 (Funding)', 'A3 (Root)'],
                    datasets: [{
                        label: 'Umbral de Alineación Requerido (%)',
                        data: [40, 85, 95, 100],
                        backgroundColor: [
                            'rgba(148, 163, 184, 0.6)', // Slate
                            'rgba(129, 178, 154, 0.6)', // Sage
                            'rgba(242, 204, 143, 0.6)', // Ochre
                            'rgba(224, 122, 95, 0.6)'   // Rust
                        ],
                        borderColor: [
                            'rgba(148, 163, 184, 1)',
                            'rgba(129, 178, 154, 1)',
                            'rgba(242, 204, 143, 1)',
                            'rgba(224, 122, 95, 1)'
                        ],
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `Alineación mínima: ${context.parsed.y}%`;
                                },
                                afterLabel: function(context) {
                                    const desc = [
                                        "Operaciones de bajo riesgo.",
                                        "Manejo de fondos. Requiere alta alineación.",
                                        "Emisión de propuestas. Control estricto anti-spam.",
                                        "Modificación core. Exige cumplimiento perfecto."
                                    ];
                                    return desc[context.dataIndex];
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: { display: true, text: 'Alineación MRCL (%)' }
                        }
                    }
                }
            });
        }

        // Section 3: Timeline Interaction
        function activateStep(stepNum) {
            // Reset all
            for(let i=1; i<=3; i++) {
                document.getElementById(`step-dot-${i}`).className = "absolute -left-[20px] bg-gray-200 w-8 h-8 rounded-full border-4 border-white flex items-center justify-center text-gray-500 text-xs font-bold transition-colors";
                document.getElementById(`step-title-${i}`).className = "text-xl font-bold text-gray-400 transition-colors";
                const content = document.getElementById(`step-content-${i}`);
                if(content) content.className = "pl-8 opacity-40 transition-opacity pointer-events-none";
            }

            // Activate up to current step
            for(let i=1; i<=stepNum; i++) {
                document.getElementById(`step-dot-${i}`).className = "absolute -left-[20px] bg-xns-fuego w-8 h-8 rounded-full border-4 border-white flex items-center justify-center text-white text-xs font-bold transition-colors";
                document.getElementById(`step-title-${i}`).className = "text-xl font-bold text-xns-code transition-colors";
                const content = document.getElementById(`step-content-${i}`);
                if(content) content.className = "pl-8 opacity-100 transition-opacity pointer-events-auto fade-in";
            }
        }

        // Section 4: System Layout Interaction
        function showSystemLayer(layer) {
            // Hide all views
            ['default', 'l0', 'l2', 'ag', 'db'].forEach(v => {
                const el = document.getElementById(`sys-view-${v}`);
                if(el) { el.classList.add('hidden'); el.classList.remove('fade-in'); }
            });
            
            // Show selected view
            const view = document.getElementById(`sys-view-${layer}`);
            if(view) { view.classList.remove('hidden'); view.classList.add('fade-in'); }

            // Update button styles
            ['l0', 'l2', 'ag', 'db'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if(btn) {
                    if(v === layer) {
                        btn.classList.add('border-xns-fuego', 'bg-gray-50');
                        btn.classList.remove('border-transparent', 'bg-white');
                    } else {
                        btn.classList.remove('border-xns-fuego', 'bg-gray-50');
                        btn.classList.add('border-transparent', 'bg-white');
                    }
                }
            });
        }

        // Run Init
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
